name: Deploy to Fly.io

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires the FLY_API_TOKEN repository secret. Skips otherwise.
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN secret is not set — skipping deploy."
            exit 0
          fi
          flyctl deploy --remote-only
