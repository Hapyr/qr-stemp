<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fafaf7">
  <title>{% block title %}QR Stempel{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">

  <script>
    // Set theme class before paint to avoid flash
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            paper: '#fafaf7',
            ink: '#1c1917',
            coffee: { 50:'#faf7f2', 100:'#f0e8db', 500:'#8b6f47', 600:'#6f5436', 700:'#52402a' }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    @keyframes pop { 0%{transform:scale(.85);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop .2s ease-out; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-full bg-paper text-ink dark:bg-stone-900 dark:text-stone-100 antialiased">
  <header class="border-b border-stone-200 dark:border-stone-800">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold">
        <span class="text-xl">☕</span>
        <span>QR Stempel</span>
      </a>
      <nav class="flex items-center gap-4 text-sm">
        {% block nav %}
        <a href="/login" class="text-stone-600 hover:text-ink dark:text-stone-400 dark:hover:text-white">Login</a>
        {% endblock %}
        <button id="theme-toggle" aria-label="Toggle theme"
                class="text-stone-600 hover:text-ink dark:text-stone-400 dark:hover:text-white text-lg leading-none">
          <span class="dark:hidden">🌙</span>
          <span class="hidden dark:inline">☀️</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-2xl mx-auto px-4 py-8 text-center text-xs text-stone-500 dark:text-stone-500">
    QR Stempel · <a href="https://github.com/" class="underline hover:text-stone-700 dark:hover:text-stone-300">GitHub</a>
  </footer>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
