# Fly.io configuration.
# First-time setup:
#   fly launch --no-deploy --copy-config
#   fly volumes create qr_stempel_data --size 1 --region <your-region>
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32)
#   fly deploy

app = "qr-stempel"
primary_region = "fra"

[build]

[env]
  PORT = "8000"
  STAMPS_TO_REDEEM = "3"

[[mounts]]
  source = "qr_stempel_data"
  destination = "/usr/src/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
